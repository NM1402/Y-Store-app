# ==========================================================================
# NGINX config example для Y-Store TMA
# ==========================================================================
# Варіант A: окремий піддомен tma.y-store.in.ua
# Варіант B: reverse-proxy на існуючий y-store.in.ua (розкоментувати нижче)
# ==========================================================================

# ----- ВАРІАНТ A — окремий піддомен -----
server {
    listen 80;
    server_name tma.y-store.in.ua;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tma.y-store.in.ua;

    ssl_certificate     /etc/letsencrypt/live/tma.y-store.in.ua/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tma.y-store.in.ua/privkey.pem;

    # Telegram WebApp vimoga — security headers
    add_header X-Frame-Options "ALLOW-FROM https://web.telegram.org";
    add_header Content-Security-Policy "frame-ancestors https://web.telegram.org https://t.me;" always;

    client_max_body_size 20M;

    # -------- Backend (FastAPI, port 8001) --------
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # -------- Frontend (React build) --------
    # Для production — рекомендується build + serve static:
    # location / {
    #     root /opt/tma/frontend/build;
    #     try_files $uri /index.html;
    # }

    # -------- Frontend (dev-mode, через port 3000) --------
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}

